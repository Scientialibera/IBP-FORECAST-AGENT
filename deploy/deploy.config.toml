# ──────────────────────────────────────────────────────────────────
# IBP Forecast Agent -- Deployment Configuration
# Client: Coil Coaters (Gerry's IBP requirements)
# ──────────────────────────────────────────────────────────────────

[fabric]
workspace_id   = "WORKSPACE_ID_PLACEHOLDER"
workspace_name = "Aura Bot"

[naming]
prefix         = ""
suffix         = ""
project_folder = "IBP Forecast"

# ── Lakehouses ───────────────────────────────────────────────────
# Leave IDs empty to auto-create; set to skip creation.
# prefix/suffix from [naming] are applied automatically by deploy-fabric.ps1.

[lakehouses]
landing_name  = "lh_ibp_landing"
landing_id    = ""
bronze_name   = "lh_ibp_bronze"
bronze_id     = ""
silver_name   = "lh_ibp_silver"
silver_id     = ""
gold_name     = "lh_ibp_gold"
gold_id       = ""

# ── Source Data ──────────────────────────────────────────────────

[source]
source_lakehouse_id   = ""
source_lakehouse_name = "lh_ibp_source"
tables = [
    "orders",
    "shipments",
    "production_history",
    "master_sku",
    "master_plant",
    "master_customer",
    "master_market",
    "budget_volumes",
    "inventory_finished_goods",
    "production_lines",
]

# ── Feature Engineering ──────────────────────────────────────────

[features]
date_column     = "period_date"
frequency       = "W"
target_column   = "tons"
grain_columns   = ["plant_id", "sku_id"]
extended_grains = ["plant_id", "sku_group", "customer_id", "market_id"]
feature_columns = ["price_per_ton", "lead_time_days", "promo_flag", "safety_stock_tons"]
feature_types   = ["float", "float", "int", "float"]

# ── Training ─────────────────────────────────────────────────────

[training]
test_split_ratio          = 0.2
models_enabled            = ["sarima", "prophet", "var", "exp_smoothing", "lightgbm"]

# SARIMA (required)
sarima_order              = [1, 1, 1]

# Prophet (required)
prophet_yearly_seasonality  = true
prophet_weekly_seasonality  = false
prophet_changepoint_prior   = 0.05

# VAR (preferred)
var_ic                    = "aic"

# Exponential Smoothing (preferred)
exp_smoothing_trend             = "add"
exp_smoothing_seasonal          = "add"

# LightGBM (global pooled)
lightgbm_n_estimators           = 800
lightgbm_max_depth              = 7
lightgbm_learning_rate          = 0.02
lightgbm_num_leaves             = 40
lightgbm_min_child_samples      = 10

[mlflow]
experiment_name          = "ibp_demand_forecast"
registered_model_prefix  = "ibp_model"

# ── Scoring ──────────────────────────────────────────────────────

[scoring]
forecast_horizon  = 52
output_table      = "forecast_versions"
metrics_table     = "model_metrics"

# ── Forecast Versioning ──────────────────────────────────────────

[versioning]
snapshot_table     = "forecast_versions"
accuracy_table     = "accuracy_tracking"
keep_n_snapshots   = 24

# ── Capacity Translation ─────────────────────────────────────────
# tons -> lineal feet -> production hours

[capacity]
output_table              = "capacity_translation"
production_history_table  = "production_history"
rolling_periods           = 3
tons_to_lf_factor         = 2000
width_column              = "width_inches"
speed_column              = "line_speed_fpm"
line_id_column            = "line_id"

# ── Sales Overrides ──────────────────────────────────────────────

[overrides]
overrides_table           = "sales_overrides"
override_output_table     = "forecast_versions"

# ── Market Adjustments ───────────────────────────────────────────

[market_adjustments]
adjustments_table         = "market_adjustments"
default_scale_factor      = 1.0

# ── Budget Comparison ────────────────────────────────────────────

[budget]
budget_table              = "budget_volumes"
comparison_output_table   = "budget_comparison"
over_forecast_threshold   = 0.10
under_forecast_threshold  = -0.10

# ── Hierarchy (drill-down levels) ────────────────────────────────

[hierarchy]
levels = ["market_id", "plant_id", "sku_group", "sku_id", "customer_id"]

# ── Phase 2: External Signals ────────────────────────────────────

[external_signals]
enabled               = false
signals_table         = "external_signals"
signal_columns        = ["construction_index", "interest_rate", "inflation_rate", "tariff_rate"]

# ── Phase 2: Scenario Modeling ───────────────────────────────────

[scenarios]
enabled               = false
scenarios_table       = "scenario_definitions"
default_scenarios     = ["ncca_only", "ncca_plus_imports"]

# ── Phase 2: SKU Classification ──────────────────────────────────

[sku_classification]
enabled               = false
output_table          = "sku_classifications"
abc_volume_column     = "tons"
xyz_cv_threshold_x    = 0.5
xyz_cv_threshold_y    = 1.0
runner_threshold      = 0.8
repeater_threshold    = 0.95

# ── Semantic Model ────────────────────────────────────────────────

[semantic_model]
name = "IBP Forecast Model"
reporting_table = "reporting_actuals_vs_forecast"
refresh_schedule_enabled = true
refresh_schedule_time    = "06:00"
refresh_schedule_timezone = "UTC"

# ── Test Data Generation ─────────────────────────────────────────

[test_data]
n_skus              = 50
n_plants            = 5
n_customers         = 20
n_markets           = 4
n_production_lines  = 10
history_periods     = 156
seed                = 42
