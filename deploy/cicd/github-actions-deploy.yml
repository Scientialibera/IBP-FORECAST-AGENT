# GitHub Actions workflow for IBP Forecast Agent deployment to Microsoft Fabric
# 
# Prerequisites:
#   1. Create a service principal with Fabric workspace access
#   2. Set these repository secrets:
#      - AZURE_CLIENT_ID       : Service principal application (client) ID
#      - AZURE_TENANT_ID       : Azure AD tenant ID
#      - AZURE_CLIENT_SECRET   : Service principal secret
#      - FABRIC_WORKSPACE_ID   : (optional) Target Fabric workspace ID
#
# Usage:
#   Copy this file to .github/workflows/deploy.yml in your repository root.

name: Deploy IBP Forecast to Fabric

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment suffix (e.g. _dev, _staging)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Deploy to Fabric
        env:
          NAMING_SUFFIX: ${{ github.event.inputs.environment || '' }}
        run: |
          pwsh ./deploy/deploy-fabric.ps1
